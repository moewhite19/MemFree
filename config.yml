#配置版本号
var: 1
debug: false
Auto_Restart: true
MaxWaring: 25
#最小内存（单位MB）
minfree: 256

#最小TPS
mintps: 8
#检测间隔 （单位 秒）
runTick: 1
#内存小于设定的值时执行
commands:
- "say §b 服务器内存满啦,需要重启释放内存."
- "say §b 服务器将在5秒后重启"
#延迟(单位 秒)
onTime: 5
#延迟执行指令
onCommands:
- "kick @a &f服务器似乎内存满了,\n请等待1分钟服务器重启完成后再加入服务器. \n§l期待与您再见."
- "restart"

limElytra: 15

#自动GC
AutoGC:
  Enable: true
  #最小危险值
  minWarin: 3
  #最小回收间隔 单位：秒
  minTick: 360



#区块实体生成限制器
MaxEntity:
  Enable: true
  #用清理AI代替移除
  ClearAI: true
  Range: 32
  DefMaxEntity: 32
  Entitys:
    DROPPED_ITEM: 512
    ITEM_FRAME: 128
    ARMOR_STAND: 128
    VILLAGER: 30
    IRON_GOLEM: 16
    CHICKEN: 16
    PIG: 16
    COW: 16
    CAT: 16
    WOLF: 16
    SHEEP: 16
    TURTLE: 16
    BEE: 26
    DOLPHIN: 26
    ZOMBIE: 26
    PILLAGER: 26
    ARROW: 64
    BAT: 16
    SKELETON: 26
    CREEPER: 26
    ENDERMAN: 26
    